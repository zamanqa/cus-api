<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Customer API - E2E Test Dashboard</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.2/jspdf.umd.min.js"></script>
  <script>
    // Fallback if CDN fails
    if (!window.jspdf) {
      var s = document.createElement('script');
      s.src = 'https://unpkg.com/jspdf@2.5.2/dist/jspdf.umd.min.js';
      document.head.appendChild(s);
    }
  </script>
  <style>
    /* ── Reset ─────────────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #1a1b2e;
      color: #d4d8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Scrollbar ─────────────────────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: #1a1b2e; }
    ::-webkit-scrollbar-thumb { background: #353860; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #4a4f80; }

    /* ── Header ────────────────────────────────────────────────────────────── */
    .header {
      background: linear-gradient(135deg, #222540 0%, #1e2040 100%);
      border-bottom: 1px solid #353860;
      padding: 20px 28px;
      flex-shrink: 0;
    }
    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 14px;
    }
    .header h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: #e8ecff;
      letter-spacing: -0.4px;
    }
    .header h1 span { color: #6c7bf0; }
    .header-actions { display: flex; gap: 10px; align-items: center; }
    .server-status {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 0.78rem; font-weight: 600; padding: 5px 14px;
      border-radius: 20px; background: #2d3050; border: 1px solid #353860;
    }
    .server-status.online { color: #4ade80; border-color: #2a5a3a; background: #1a3a2a; }
    .server-status.offline { color: #f87171; border-color: #5a2020; background: #3a1a1a; }
    .status-dot {
      width: 8px; height: 8px; border-radius: 50%; display: inline-block;
    }
    .status-dot.online { background: #4ade80; box-shadow: 0 0 6px #4ade80; }
    .status-dot.offline { background: #f87171; box-shadow: 0 0 6px #f87171; }

    /* ── Buttons ───────────────────────────────────────────────────────────── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 18px;
      border-radius: 10px;
      border: none;
      font-size: 0.84rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      white-space: nowrap;
    }
    .btn-primary { background: #6c7bf0; color: #fff; }
    .btn-primary:hover { background: #5a69e0; transform: translateY(-1px); }
    .btn-secondary { background: #2d3050; color: #8890b5; border: 1px solid #353860; }
    .btn-secondary:hover { background: #353860; color: #d4d8f0; }
    .btn-danger { background: #5a2020; color: #f87171; border: 1px solid #7a3030; }
    .btn-danger:hover { background: #7a3030; color: #fca5a5; }
    .btn-run {
      background: #1a3a2a;
      color: #4ade80;
      border: 1px solid #2a5a3a;
      font-size: 0.76rem;
      padding: 4px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.2s ease;
      white-space: nowrap;
    }
    .btn-run:hover { background: #2a5a3a; color: #86efac; }
    .btn-run.running { background: #3a2f1a; color: #fbbf24; border-color: #6b5520; cursor: wait; }
    .btn-run.done-ok { background: #1a3a2a; color: #4ade80; border-color: #2a7a4a; }
    .btn-run.done-fail { background: #3a1a1a; color: #f87171; border-color: #7a3030; }

    /* ── Stats Row ─────────────────────────────────────────────────────────── */
    .stats-row {
      display: flex;
      gap: 16px;
      margin-top: 18px;
      flex-wrap: wrap;
    }
    .stat-box {
      background: #222540;
      border: 1px solid #353860;
      border-radius: 12px;
      padding: 12px 22px;
      text-align: center;
      min-width: 95px;
      transition: transform 0.2s ease;
    }
    .stat-box:hover { transform: translateY(-2px); }
    .stat-box .num { font-size: 1.8rem; font-weight: 700; color: #6c7bf0; }
    .stat-box .lbl {
      font-size: 0.7rem;
      color: #8890b5;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-top: 2px;
    }
    .stat-box.pass .num { color: #4ade80; }
    .stat-box.fail .num { color: #f87171; }

    /* ── Tab Bar ───────────────────────────────────────────────────────────── */
    .tab-bar {
      background: #1e2040;
      border-bottom: 1px solid #353860;
      padding: 10px 20px 0;
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      flex-shrink: 0;
    }
    .tab-btn {
      padding: 8px 14px;
      border: none;
      background: transparent;
      color: #8890b5;
      font-size: 0.78rem;
      font-weight: 600;
      cursor: pointer;
      border-radius: 8px 8px 0 0;
      transition: all 0.2s ease;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }
    .tab-btn:hover { background: #2d3050; color: #d4d8f0; }
    .tab-btn.active {
      background: #222540;
      color: #6c7bf0;
      border-bottom: 2px solid #6c7bf0;
    }
    .tab-badge {
      background: #353860;
      color: #8890b5;
      font-size: 0.65rem;
      padding: 1px 7px;
      border-radius: 10px;
      font-weight: 700;
    }
    .tab-btn.active .tab-badge {
      background: #6c7bf0;
      color: #fff;
    }

    /* ── Split Layout ──────────────────────────────────────────────────────── */
    .main-split {
      display: flex;
      flex: 1;
      overflow: hidden;
    }
    .left-panel {
      width: 40%;
      flex-shrink: 0;
      overflow-y: auto;
      padding: 20px 24px;
      min-width: 0;
    }
    .right-panel {
      width: 60%;
      min-width: 380px;
      background: #222540;
      border-left: 1px solid #353860;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }
    .log-header {
      padding: 14px 18px;
      background: #1e2040;
      border-bottom: 1px solid #353860;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .log-header h3 {
      font-size: 0.9rem;
      color: #d4d8f0;
      font-weight: 600;
    }
    .log-body {
      flex: 1;
      overflow-y: auto;
      padding: 14px 18px;
      font-family: 'Consolas', 'Fira Code', 'Courier New', monospace;
      font-size: 0.78rem;
      line-height: 1.6;
      color: #8890b5;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .log-body .log-pass { color: #4ade80; }
    .log-body .log-fail { color: #f87171; }
    .log-body .log-info { color: #6c7bf0; }
    .log-body .log-warn { color: #fbbf24; }
    .log-body .log-bold { font-weight: 700; color: #d4d8f0; }

    /* ── Progress Bar ──────────────────────────────────────────────────────── */
    .progress-bar-container {
      height: 6px;
      background: #1a1b2e;
      border-radius: 3px;
      overflow: hidden;
      margin: 8px 18px;
      display: none;
      flex-shrink: 0;
    }
    .progress-bar-container.visible { display: block; }
    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #6c7bf0, #4ade80);
      border-radius: 3px;
      width: 0%;
      transition: width 0.3s ease;
    }

    /* ── Tab Content ───────────────────────────────────────────────────────── */
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* ── Accordion ─────────────────────────────────────────────────────────── */
    .accordion {
      background: #222540;
      border: 1px solid #353860;
      border-radius: 12px;
      margin-bottom: 14px;
      overflow: hidden;
      transition: box-shadow 0.2s ease;
    }
    .accordion:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.2); }
    .accordion-header {
      padding: 14px 18px;
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      user-select: none;
      transition: background 0.15s ease;
    }
    .accordion-header:hover { background: #2a2d50; }
    .accordion-chevron {
      font-size: 0.7rem;
      color: #8890b5;
      transition: transform 0.2s ease;
      flex-shrink: 0;
      width: 16px;
    }
    .accordion.open .accordion-chevron { transform: rotate(90deg); }
    .accordion-title {
      font-size: 0.88rem;
      font-weight: 600;
      color: #d4d8f0;
      flex: 1;
    }
    .accordion-counters {
      font-size: 0.72rem;
      color: #8890b5;
      display: flex;
      gap: 8px;
      align-items: center;
      flex-shrink: 0;
    }
    .accordion-counters .c-pass { color: #4ade80; }
    .accordion-counters .c-fail { color: #f87171; }
    .accordion-counters .c-total { color: #8890b5; }
    .accordion-body {
      display: none;
      border-top: 1px solid #353860;
    }
    .accordion.open .accordion-body { display: block; }

    /* ── Table ─────────────────────────────────────────────────────────────── */
    .test-table {
      width: 100%;
      border-collapse: collapse;
    }
    .test-table th {
      text-align: left;
      padding: 10px 16px;
      font-size: 0.7rem;
      color: #8890b5;
      text-transform: uppercase;
      letter-spacing: 0.7px;
      background: #1e2040;
      border-bottom: 1px solid #353860;
    }
    .test-table td {
      padding: 10px 16px;
      font-size: 0.82rem;
      border-bottom: 1px solid rgba(53, 56, 96, 0.4);
      color: #d4d8f0;
    }
    .test-table tr:last-child td { border-bottom: none; }
    .test-table tr:hover td { background: rgba(108, 123, 240, 0.04); }
    .test-table .col-num { width: 40px; text-align: center; color: #8890b5; }
    .test-table .col-db { width: 90px; text-align: center; }
    .test-table .col-status { width: 100px; text-align: center; }

    /* ── Status Badges ─────────────────────────────────────────────────────── */
    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 8px;
      font-size: 0.7rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.15s ease;
      user-select: none;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .badge:hover { transform: scale(1.05); }
    .badge-notrun { background: #2d3050; color: #8890b5; }
    .badge-pass { background: #1a3a2a; color: #4ade80; }
    .badge-fail { background: #3a1a1a; color: #f87171; }
    .badge-blocked { background: #3a2f1a; color: #fbbf24; }
    .badge-skip { background: #2d3050; color: #6c7bf0; }

    .db-badge {
      font-size: 0.7rem;
      padding: 2px 8px;
      border-radius: 6px;
      font-weight: 600;
    }
    .db-yes { background: #1a3a2a; color: #4ade80; }
    .db-no { background: #2d3050; color: #8890b5; }

    /* ── Reports Tab ───────────────────────────────────────────────────────── */
    .reports-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 14px;
    }
    .report-card {
      background: #222540;
      border: 1px solid #353860;
      border-radius: 12px;
      padding: 16px;
      cursor: pointer;
      transition: all 0.2s ease;
      position: relative;
    }
    .report-card:hover { border-color: #6c7bf0; transform: translateY(-2px); box-shadow: 0 4px 20px rgba(0,0,0,0.2); }
    .report-card.selected { border-color: #6c7bf0; background: #2a2d55; }
    .report-card .rc-title { font-size: 0.85rem; font-weight: 600; color: #d4d8f0; margin-bottom: 6px; }
    .report-card .rc-time { font-size: 0.72rem; color: #8890b5; margin-bottom: 8px; }
    .report-card .rc-stats { display: flex; gap: 10px; font-size: 0.75rem; }
    .report-card .rc-pass { color: #4ade80; }
    .report-card .rc-fail { color: #f87171; }
    .report-card .rc-check {
      position: absolute;
      top: 10px;
      right: 10px;
      width: 18px;
      height: 18px;
      border: 2px solid #353860;
      border-radius: 4px;
      cursor: pointer;
    }
    .report-card.selected .rc-check { background: #6c7bf0; border-color: #6c7bf0; }

    /* Report Detail Modal */
    .report-detail-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(10, 10, 20, 0.85);
      z-index: 1000;
      justify-content: center;
      align-items: center;
    }
    .report-detail-overlay.visible { display: flex; }
    .report-detail-modal {
      background: #222540;
      border: 1px solid #353860;
      border-radius: 14px;
      width: 90%;
      max-width: 800px;
      max-height: 80vh;
      overflow-y: auto;
      padding: 28px;
    }
    .report-detail-modal h2 {
      font-size: 1.1rem;
      color: #d4d8f0;
      margin-bottom: 6px;
    }
    .report-detail-modal .rd-time { font-size: 0.78rem; color: #8890b5; margin-bottom: 18px; }
    .report-detail-modal .rd-close {
      position: absolute;
      top: 12px;
      right: 18px;
      background: none;
      border: none;
      color: #8890b5;
      font-size: 1.4rem;
      cursor: pointer;
    }
    .rd-test-list { list-style: none; }
    .rd-test-item {
      padding: 10px 14px;
      border-bottom: 1px solid rgba(53, 56, 96, 0.4);
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }
    .rd-test-item:last-child { border-bottom: none; }
    .rd-test-title { flex: 1; font-size: 0.84rem; color: #d4d8f0; }
    .rd-test-err { font-size: 0.76rem; color: #f87171; margin-top: 4px; font-family: monospace; }

    /* ── Toast ─────────────────────────────────────────────────────────────── */
    .toast-container {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 2000;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .toast {
      padding: 12px 20px;
      border-radius: 10px;
      font-size: 0.82rem;
      font-weight: 600;
      animation: toastIn 0.3s ease, toastOut 0.3s ease 2.7s forwards;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }
    .toast-success { background: #1a3a2a; color: #4ade80; border: 1px solid #2a5a3a; }
    .toast-error { background: #3a1a1a; color: #f87171; border: 1px solid #5a2020; }
    .toast-info { background: #222540; color: #6c7bf0; border: 1px solid #353860; }
    @keyframes toastIn { from { opacity: 0; transform: translateX(40px); } to { opacity: 1; transform: translateX(0); } }
    @keyframes toastOut { from { opacity: 1; } to { opacity: 0; transform: translateY(-10px); } }

    /* ── Footer ────────────────────────────────────────────────────────────── */
    .footer {
      background: #1e2040;
      border-top: 1px solid #353860;
      padding: 12px 28px;
      text-align: center;
      font-size: 0.72rem;
      color: #8890b5;
      flex-shrink: 0;
    }

    /* ── Error Summary ─────────────────────────────────────────────────────── */
    .error-summary {
      background: #3a1a1a;
      border: 1px solid #5a2020;
      border-radius: 10px;
      padding: 14px 18px;
      margin: 10px 18px;
      display: none;
    }
    .error-summary.visible { display: block; }
    .error-summary h4 { color: #f87171; font-size: 0.84rem; margin-bottom: 8px; }
    .error-summary ul { list-style: none; }
    .error-summary li {
      padding: 6px 0;
      border-bottom: 1px solid rgba(248,113,113,0.15);
      font-size: 0.78rem;
      color: #fca5a5;
    }
    .error-summary li:last-child { border-bottom: none; }
    .error-summary .err-title { font-weight: 600; color: #f87171; }
    .error-summary .err-msg { color: #d4a0a0; margin-top: 2px; font-family: monospace; font-size: 0.72rem; }
  </style>
</head>
<body>

  <!-- ── Header ──────────────────────────────────────────────────────────── -->
  <div class="header">
    <div class="header-top">
      <h1>Customer <span>API</span> - E2E Test Dashboard</h1>
      <div class="header-actions">
        <span class="server-status" id="serverStatus"><span class="status-dot offline"></span> Server Offline</span>
        <button class="btn btn-secondary" onclick="doSync()">Sync</button>
        <button class="btn btn-primary" id="runAllHeadedBtn" onclick="runAll('headed')">Run All Headed</button>
        <button class="btn btn-secondary" id="runAllHeadlessBtn" onclick="runAll('headless')">Run All Headless</button>
        <button class="btn btn-danger" id="stopBtn" onclick="stopTests()" style="display:none;">Stop</button>
      </div>
    </div>
    <div class="stats-row">
      <div class="stat-box"><div class="num" id="statTotal">0</div><div class="lbl">Total Tests</div></div>
      <div class="stat-box"><div class="num" id="statFiles">0</div><div class="lbl">Test Files</div></div>
      <div class="stat-box"><div class="num" id="statModules">0</div><div class="lbl">API Modules</div></div>
      <div class="stat-box pass"><div class="num" id="statPassed">0</div><div class="lbl">Passed</div></div>
      <div class="stat-box fail"><div class="num" id="statFailed">0</div><div class="lbl">Failed</div></div>
    </div>
  </div>

  <!-- ── Tab Bar ─────────────────────────────────────────────────────────── -->
  <div class="tab-bar" id="tabBar"></div>

  <!-- ── Main Split ──────────────────────────────────────────────────────── -->
  <div class="main-split">
    <div class="left-panel" id="leftPanel"></div>
    <div class="right-panel">
      <div class="log-header">
        <h3>Live Log</h3>
        <button class="btn btn-secondary" style="padding:4px 10px;font-size:0.72rem;" onclick="clearLog()">Clear</button>
      </div>
      <div class="progress-bar-container" id="progressBarContainer">
        <div class="progress-bar" id="progressBar"></div>
      </div>
      <div class="error-summary" id="errorSummary">
        <h4>Failed Tests</h4>
        <ul id="errorList"></ul>
      </div>
      <div class="log-body" id="logBody">Waiting for test run...</div>
    </div>
  </div>

  <!-- ── Report Detail Overlay ───────────────────────────────────────────── -->
  <div class="report-detail-overlay" id="reportDetailOverlay" onclick="if(event.target===this)closeReportDetail()">
    <div class="report-detail-modal" id="reportDetailModal"></div>
  </div>

  <!-- ── Toast Container ─────────────────────────────────────────────────── -->
  <div class="toast-container" id="toastContainer"></div>

  <!-- ── Footer ──────────────────────────────────────────────────────────── -->
  <div class="footer" id="footerBar">Customer API Test Cases</div>

<script>
/* ════════════════════════════════════════════════════════════════════════════
   DATA
   ════════════════════════════════════════════════════════════════════════════ */
const SERVER = 'http://127.0.0.1:7357';
const STATUS_CYCLE = ['notrun','pass','fail','blocked','skip'];

const TABS = [
  {
    id: 'orders', label: 'Orders', num: '01',
    files: [{
      name: '01-orders/orders.cy.js',
      spec: 'cypress/e2e/customer-api/01-orders/orders.cy.js',
      tests: [
        { title: 'Return a paginated list of orders', db: false },
        { title: 'Find order by ID from DB and verify via API', db: true },
        { title: 'Create a new order with random 12-digit order_id', db: false },
        { title: 'Open payment update link for a specific order', db: false },
        { title: 'Fetch payment details and verify provider', db: false },
        { title: 'Create a note to order and verify success', db: false },
        { title: 'Fulfill order using DB order ID', db: true },
        { title: 'Cancel order using DB order ID', db: true },
        { title: 'Tag order using DB order ID', db: true },
        { title: 'Charge order using chargeable order from DB', db: true },
        { title: 'Generate invoice for invoiceable order from DB', db: true },
        { title: 'Update order address using DB order ID', db: true }
      ]
    }]
  },
  {
    id: 'customers', label: 'Customers', num: '02',
    files: [{
      name: '02-customers/customers.cy.js',
      spec: 'cypress/e2e/customer-api/02-customers/customers.cy.js',
      tests: [
        { title: 'Return a paginated list of customers', db: false },
        { title: 'Fetch customer by ID and verify in DB', db: true },
        { title: 'Show customer balance', db: false },
        { title: 'Update customer balance and verify updated remaining_amount', db: true },
        { title: 'Update customer external_customer_id and verify in DB', db: true },
        { title: 'Delete existing referral and create referral code for customer', db: true },
        { title: 'Get referral code and match with created one', db: false },
        { title: 'Delete referral code from database for next run', db: true },
        { title: 'Create a new customer and verify in DB', db: true },
        { title: 'Validate a customer address', db: false },
        { title: 'Transfer (merge) two customers and verify in DB', db: true }
      ]
    }]
  },
  {
    id: 'invoices', label: 'Invoices', num: '03',
    files: [{
      name: '03-invoices/invoices.cy.js',
      spec: 'cypress/e2e/customer-api/03-invoices/invoices.cy.js',
      tests: [
        { title: 'Return a paginated list of invoices', db: false },
        { title: 'Fetch invoice by ID and verify in DB', db: true },
        { title: 'Settle the latest unpaid invoice and verify paid in DB', db: true },
        { title: 'Refund the latest paid invoice and verify in DB', db: true },

/* ════════════════════════════════════════════════════════════════════════════
   STATE
   ════════════════════════════════════════════════════════════════════════════ */
let activeTab = TABS[0].id;
let runningSource = null;
let totalRunPassed = 0;
let totalRunFailed = 0;
let selectedReports = new Set();

/* ════════════════════════════════════════════════════════════════════════════
   INIT
   ════════════════════════════════════════════════════════════════════════════ */
document.addEventListener('DOMContentLoaded', () => {
  // Compute dynamic stats from TABS data
  const totalTests = TABS.reduce((s, tab) => s + tab.files.reduce((s2, f) => s2 + f.tests.length, 0), 0);
  const totalFiles = TABS.reduce((s, tab) => s + tab.files.length, 0);
  const totalModules = TABS.length;
  document.getElementById('statTotal').textContent = totalTests;
  document.getElementById('statFiles').textContent = totalFiles;
  document.getElementById('statModules').textContent = totalModules;
  document.getElementById('footerBar').innerHTML =
    `Customer API Test Cases &middot; ${totalFiles} test files &middot; ${totalTests} tests total`;

  buildTabBar();
  buildTabContents();
  switchTab(TABS[0].id);
  updateGlobalStats();
});

/* ════════════════════════════════════════════════════════════════════════════
   TAB BAR
   ════════════════════════════════════════════════════════════════════════════ */
function buildTabBar() {
  const bar = document.getElementById('tabBar');
  let html = '';
  TABS.forEach(tab => {
    const count = tab.files.reduce((s, f) => s + f.tests.length, 0);
    html += `<button class="tab-btn" data-tab="${tab.id}" onclick="switchTab('${tab.id}')">
      ${tab.label} <span class="tab-badge">${count}</span>
    </button>`;
  });
  html += `<button class="tab-btn" data-tab="reports" onclick="switchTab('reports')">
    Reports <span class="tab-badge">...</span>
  </button>`;
  bar.innerHTML = html;
}

function switchTab(tabId) {
  activeTab = tabId;
  document.querySelectorAll('.tab-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.tab === tabId);
  });
  document.querySelectorAll('.tab-content').forEach(c => {
    c.classList.toggle('active', c.id === 'tab-' + tabId);
  });
  if (tabId === 'reports') loadReports();
}

/* ════════════════════════════════════════════════════════════════════════════
   BUILD TAB CONTENTS
   ════════════════════════════════════════════════════════════════════════════ */
function buildTabContents() {
  const panel = document.getElementById('leftPanel');
  let html = '';

  TABS.forEach(tab => {
    html += `<div class="tab-content" id="tab-${tab.id}">`;
    tab.files.forEach((file, fi) => {
      const accId = `${tab.id}-f${fi}`;
      html += `<div class="accordion open" id="acc-${accId}">
        <div class="accordion-header" onclick="toggleAccordion('${accId}')">
          <span class="accordion-chevron">&#9654;</span>
          <span class="accordion-title">${file.name}</span>
          <span class="accordion-counters" id="counters-${accId}">
            <span class="c-pass">0/${file.tests.length} passed</span>
            <span class="c-fail">0 failed</span>
          </span>
          <button class="btn-run" onclick="event.stopPropagation();runSpec('${file.spec}','${accId}',this,'headed')"
            id="runbtn-headed-${accId}">Headed</button>
          <button class="btn-run" onclick="event.stopPropagation();runSpec('${file.spec}','${accId}',this,'headless')"
            id="runbtn-headless-${accId}" style="color:#6c7bf0;border-color:#4a4f80;">Headless</button>
        </div>
        <div class="accordion-body">
          <table class="test-table">
            <thead>
              <tr>
                <th class="col-num">#</th>
                <th>Test Case</th>
                <th class="col-db">DB Verified</th>
                <th class="col-status">Status</th>
              </tr>
            </thead>
            <tbody>`;
      file.tests.forEach((test, ti) => {
        const statusKey = `status:${tab.id}-f${fi}-t${ti}`;
        const saved = localStorage.getItem(statusKey) || 'notrun';
        html += `<tr>
          <td class="col-num">${ti + 1}</td>
          <td>${escapeHtml(test.title)}</td>
          <td class="col-db">
            <span class="db-badge ${test.db ? 'db-yes' : 'db-no'}">${test.db ? 'Yes' : 'No'}</span>
          </td>
          <td class="col-status">
            <span class="badge badge-${saved}" data-key="${statusKey}"
              data-acc="${accId}"
              onclick="cycleStatus(this)">${statusLabel(saved)}</span>
          </td>
        </tr>`;
      });
      html += `</tbody></table></div></div>`;
    });
    html += `</div>`;
  });

  // Reports tab
  html += `<div class="tab-content" id="tab-reports">
    <div style="display:flex;gap:10px;margin-bottom:16px;align-items:center;">
      <button class="btn btn-secondary" onclick="loadReports()">⟳ Refresh</button>
      <button class="btn btn-primary" onclick="downloadSelectedReports()">⬇ Download PDF</button>
      <button class="btn btn-danger" onclick="deleteSelectedReports()">✕ Delete Selected</button>
    </div>
    <div class="reports-grid" id="reportsGrid">Loading reports...</div>
  </div>`;

  panel.innerHTML = html;

  // Restore counters
  TABS.forEach(tab => {
    tab.files.forEach((file, fi) => {
      updateAccordionCounters(`${tab.id}-f${fi}`);
    });
  });
}

/* ════════════════════════════════════════════════════════════════════════════
   ACCORDION
   ════════════════════════════════════════════════════════════════════════════ */
function toggleAccordion(accId) {
  const el = document.getElementById('acc-' + accId);
  if (el) el.classList.toggle('open');
}

/* ════════════════════════════════════════════════════════════════════════════
   STATUS BADGES
   ════════════════════════════════════════════════════════════════════════════ */
function statusLabel(s) {
  const m = { notrun: 'Not Run', pass: 'Pass', fail: 'Fail', blocked: 'Blocked', skip: 'Skip' };
  return m[s] || 'Not Run';
}

function cycleStatus(el) {
  const key = el.dataset.key;
  const accId = el.dataset.acc;
  let current = localStorage.getItem(key) || 'notrun';
  let idx = STATUS_CYCLE.indexOf(current);
  idx = (idx + 1) % STATUS_CYCLE.length;
  const next = STATUS_CYCLE[idx];
  localStorage.setItem(key, next);
  el.className = 'badge badge-' + next;
  el.textContent = statusLabel(next);
  updateAccordionCounters(accId);
  updateGlobalStats();
}

function setTestStatus(tabId, fi, ti, status) {
  const key = `status:${tabId}-f${fi}-t${ti}`;
  const accId = `${tabId}-f${fi}`;
  localStorage.setItem(key, status);
  const el = document.querySelector(`[data-key="${key}"]`);
  if (el) {
    el.className = 'badge badge-' + status;
    el.textContent = statusLabel(status);
  }
  updateAccordionCounters(accId);
}

/* ════════════════════════════════════════════════════════════════════════════
   ACCORDION COUNTERS
   ════════════════════════════════════════════════════════════════════════════ */
function updateAccordionCounters(accId) {
  const countersEl = document.getElementById('counters-' + accId);
  if (!countersEl) return;
  const badges = document.querySelectorAll(`#acc-${accId} .badge`);
  let passed = 0, failed = 0, total = badges.length;
  badges.forEach(b => {
    const key = b.dataset.key;
    const s = localStorage.getItem(key) || 'notrun';
    if (s === 'pass') passed++;
    if (s === 'fail') failed++;
  });
  countersEl.innerHTML = `<span class="c-pass">${passed}/${total} passed</span>` +
    (failed > 0 ? ` <span class="c-fail">&middot; ${failed} failed</span>` : '');
}

/* ════════════════════════════════════════════════════════════════════════════
   GLOBAL STATS
   ════════════════════════════════════════════════════════════════════════════ */
function updateGlobalStats() {
  let passed = 0, failed = 0;
  TABS.forEach(tab => {
    tab.files.forEach((file, fi) => {
      file.tests.forEach((test, ti) => {
        const s = localStorage.getItem(`status:${tab.id}-f${fi}-t${ti}`) || 'notrun';
        if (s === 'pass') passed++;
        if (s === 'fail') failed++;
      });
    });
  });
  document.getElementById('statPassed').textContent = passed;
  document.getElementById('statFailed').textContent = failed;
}

/* ════════════════════════════════════════════════════════════════════════════
   LOG PANEL
   ════════════════════════════════════════════════════════════════════════════ */
function appendLog(msg, cls) {
  const body = document.getElementById('logBody');
  const span = document.createElement('span');
  if (cls) span.className = cls;
  span.textContent = msg + '\n';
  body.appendChild(span);
  body.scrollTop = body.scrollHeight;
}

function clearLog() {
  document.getElementById('logBody').innerHTML = '';
  document.getElementById('errorSummary').classList.remove('visible');
  document.getElementById('progressBarContainer').classList.remove('visible');
}

function setProgress(pct) {
  const container = document.getElementById('progressBarContainer');
  const bar = document.getElementById('progressBar');
  container.classList.add('visible');
  bar.style.width = Math.min(100, pct) + '%';
}

/* ════════════════════════════════════════════════════════════════════════════
   TOAST
   ════════════════════════════════════════════════════════════════════════════ */
function showToast(msg, type) {
  const container = document.getElementById('toastContainer');
  const t = document.createElement('div');
  t.className = 'toast toast-' + (type || 'info');
  t.textContent = msg;
  container.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

/* ════════════════════════════════════════════════════════════════════════════
   SYNC
   ════════════════════════════════════════════════════════════════════════════ */
function doSync() {
  fetch(SERVER + '/sync')
    .then(r => r.json())
    .then(data => {
      showToast('Sync completed successfully', 'success');
    })
    .catch(err => {
      showToast('Sync failed: ' + err.message, 'error');
    });
}

/* ════════════════════════════════════════════════════════════════════════════
   STOP TESTS
   ════════════════════════════════════════════════════════════════════════════ */
function stopTests() {
  if (runningSource) {
    runningSource.close();
    runningSource = null;
  }
  // Tell server to kill the Cypress process
  fetch(SERVER + '/stop', { method: 'POST' }).catch(() => {});

  appendLog('', '');
  appendLog('=== Tests Stopped by User ===', 'log-fail');

  // Reset all buttons
  document.getElementById('stopBtn').style.display = 'none';
  const hBtn = document.getElementById('runAllHeadedBtn');
  const hlBtn = document.getElementById('runAllHeadlessBtn');
  if (hBtn) { hBtn.textContent = 'Run All Headed'; hBtn.disabled = false; }
  if (hlBtn) { hlBtn.textContent = 'Run All Headless'; hlBtn.disabled = false; }

  // Reset any running file buttons
  document.querySelectorAll('.btn-run.running').forEach(btn => {
    btn.classList.remove('running');
    btn.textContent = btn.dataset.label || 'Headed';
  });

  setProgress(0);
  showToast('Tests stopped', 'error');
}

/* ════════════════════════════════════════════════════════════════════════════
   RUN ALL
   ════════════════════════════════════════════════════════════════════════════ */
function resetStats() {
  totalRunPassed = 0;
  totalRunFailed = 0;
  document.getElementById('statPassed').textContent = '0';
  document.getElementById('statFailed').textContent = '0';
  // Clear old test statuses from localStorage so they don't carry over
  TABS.forEach(tab => {
    tab.files.forEach((file, fi) => {
      file.tests.forEach((test, ti) => {
        const key = `status:${tab.id}-f${fi}-t${ti}`;
        localStorage.removeItem(key);
        const el = document.querySelector(`[data-key="${key}"]`);
        if (el) { el.className = 'badge badge-notrun'; el.textContent = 'NOT RUN'; }
      });
      updateAccordionCounters(`${tab.id}-f${fi}`);
    });
  });
}

function runAll(mode) {
  mode = mode || 'headed';
  const btn = document.getElementById(mode === 'headless' ? 'runAllHeadlessBtn' : 'runAllHeadedBtn');
  if (runningSource) {
    showToast('A test run is already in progress', 'error');
    return;
  }
  clearLog();
  resetStats();
  btn.textContent = 'Running...';
  btn.disabled = true;
  // Disable the other button too
  const otherBtn = document.getElementById(mode === 'headless' ? 'runAllHeadedBtn' : 'runAllHeadlessBtn');
  if (otherBtn) otherBtn.disabled = true;
  appendLog(`=== Run All Tests (${mode}) ===`, 'log-bold');
  appendLog('Spec: cypress/e2e/customer-api/**/*.cy.js', 'log-info');
  appendLog('', '');

  const spec = 'cypress/e2e/customer-api/**/*.cy.js';
  runWithEventSource(spec, null, null, btn, mode);
}

/* ════════════════════════════════════════════════════════════════════════════
   RUN SPEC
   ════════════════════════════════════════════════════════════════════════════ */
function runSpec(spec, accId, btn, mode) {
  mode = mode || 'headed';
  if (runningSource) {
    showToast('A test run is already in progress', 'error');
    return;
  }
  clearLog();
  resetStats();
  btn.dataset.label = btn.textContent;
  btn.classList.add('running');
  btn.textContent = 'Running...';
  appendLog(`=== Run Spec (${mode}) ===`, 'log-bold');
  appendLog('Spec: ' + spec, 'log-info');
  appendLog('', '');

  runWithEventSource(spec, accId, btn, null, mode);
}

/* ════════════════════════════════════════════════════════════════════════════
   EVENT SOURCE HANDLER
   ════════════════════════════════════════════════════════════════════════════ */
function runWithEventSource(spec, accId, fileBtn, globalBtn, mode) {
  mode = mode || 'headed';
  const url = SERVER + '/run?spec=' + encodeURIComponent(spec) + '&mode=' + mode;
  const es = new EventSource(url);
  runningSource = es;
  document.getElementById('stopBtn').style.display = 'inline-flex';
  let specCount = 0;
  let totalSpecs = TABS.length;
  if (accId) totalSpecs = 1;

  es.onmessage = function(event) {
    try {
      const data = JSON.parse(event.data);

      if (data.status === 'log') {
        appendLog(data.message || data.data || '', '');
      }

      if (data.status === 'file-start') {
        appendLog('--- ' + (data.file || data.spec || '') + ' ---', 'log-info');
      }

      if (data.status === 'spec-done') {
        specCount++;
        const sp = data.specPasses || 0;
        const sf = data.specFailures || 0;
        totalRunPassed += sp;
        totalRunFailed += sf;
        appendLog(`  Passed: ${sp}  Failed: ${sf}  Total: ${data.specTotal || (sp + sf)}`,
          sf > 0 ? 'log-fail' : 'log-pass');
        setProgress((specCount / totalSpecs) * 100);
        document.getElementById('statPassed').textContent = totalRunPassed;
        document.getElementById('statFailed').textContent = totalRunFailed;
      }

      if (data.status === 'done') {
        es.close();
        runningSource = null;
        document.getElementById('stopBtn').style.display = 'none';
        setProgress(100);

        const ok = data.ok;
        const report = data.report || {};
        const passes = report.passes || [];
        const failures = report.failures || [];

        appendLog('', '');
        appendLog('=== Run Complete ===', 'log-bold');
        appendLog(`Result: ${ok ? 'PASSED' : 'FAILED'}`, ok ? 'log-pass' : 'log-fail');
        appendLog(`Total Passed: ${passes.length}  Failed: ${failures.length}`, '');

        // Update row statuses from report
        applyReportToRows(passes, failures);

        // Show error summary
        if (failures.length > 0) {
          showErrorSummary(failures);
        }

        // Update button states
        if (fileBtn) {
          fileBtn.classList.remove('running');
          fileBtn.classList.add(ok ? 'done-ok' : 'done-fail');
          fileBtn.textContent = ok ? 'Passed' : 'Failed';
          const origLabel = fileBtn.dataset.label || 'Headed';
          setTimeout(() => {
            fileBtn.classList.remove('done-ok', 'done-fail');
            fileBtn.textContent = origLabel;
          }, 5000);
        }
        if (globalBtn) {
          const origText = globalBtn.id === 'runAllHeadlessBtn' ? 'Run All Headless' : 'Run All Headed';
          globalBtn.textContent = ok ? 'All Passed' : 'Some Failed';
          globalBtn.disabled = false;
          // Re-enable the other button
          const otherId = globalBtn.id === 'runAllHeadlessBtn' ? 'runAllHeadedBtn' : 'runAllHeadlessBtn';
          const otherBtn = document.getElementById(otherId);
          if (otherBtn) otherBtn.disabled = false;
          setTimeout(() => { globalBtn.textContent = origText; }, 5000);
        }

        updateGlobalStats();
      }
    } catch (e) {
      appendLog(event.data, '');
    }
  };

  es.onerror = function() {
    es.close();
    runningSource = null;
    document.getElementById('stopBtn').style.display = 'none';
    appendLog('Connection lost or error occurred.', 'log-fail');
    if (fileBtn) {
      fileBtn.classList.remove('running');
      fileBtn.classList.add('done-fail');
      fileBtn.textContent = 'Error';
      const origLabel = fileBtn.dataset.label || 'Headed';
      setTimeout(() => {
        fileBtn.classList.remove('done-fail');
        fileBtn.textContent = origLabel;
      }, 5000);
    }
    if (globalBtn) {
      const origText = globalBtn.id === 'runAllHeadlessBtn' ? 'Run All Headless' : 'Run All Headed';
      globalBtn.textContent = origText;
      globalBtn.disabled = false;
      const otherId = globalBtn.id === 'runAllHeadlessBtn' ? 'runAllHeadedBtn' : 'runAllHeadlessBtn';
      const otherBtn = document.getElementById(otherId);
      if (otherBtn) otherBtn.disabled = false;
    }
  };
}

/* ════════════════════════════════════════════════════════════════════════════
   APPLY REPORT TO ROWS
   ════════════════════════════════════════════════════════════════════════════ */
function extractTestCore(title) {
  // "Customer Transactions API Test 1: Fetch all transactions..." → "fetch all transactions..."
  // "Test 1: Fetch all transactions..." → "fetch all transactions..."
  // "Fetch all transactions..." → "fetch all transactions..."
  const s = (title || '');
  // Remove everything up to and including "Test N:" if present anywhere
  const m = s.match(/Test\s+\d+:\s*(.*)/i);
  return (m ? m[1] : s).trim().toLowerCase();
}

function applyReportToRows(passes, failures) {
  // Build lookup arrays with extracted core titles from report
  const passItems = passes.map(p => ({ core: extractTestCore(p.title), item: p }));
  const failItems = failures.map(f => ({ core: extractTestCore(f.title), item: f }));

  TABS.forEach(tab => {
    tab.files.forEach((file, fi) => {
      file.tests.forEach((test, ti) => {
        const tabCore = extractTestCore(test.title);
        const isPass = passItems.some(p => p.core === tabCore || p.core.includes(tabCore) || tabCore.includes(p.core));
        const isFail = failItems.some(f => f.core === tabCore || f.core.includes(tabCore) || tabCore.includes(f.core));
        if (isPass) {
          setTestStatus(tab.id, fi, ti, 'pass');
        } else if (isFail) {
          setTestStatus(tab.id, fi, ti, 'fail');
        }
      });
    });
  });
  updateGlobalStats();
}

/* ════════════════════════════════════════════════════════════════════════════
   ERROR SUMMARY
   ════════════════════════════════════════════════════════════════════════════ */
function showErrorSummary(failures) {
  const el = document.getElementById('errorSummary');
  const list = document.getElementById('errorList');
  list.innerHTML = '';
  failures.forEach(f => {
    const li = document.createElement('li');
    li.innerHTML = `<div class="err-title">${escapeHtml(f.title)}</div>` +
      (f.err && f.err.message ? `<div class="err-msg">${escapeHtml(f.err.message)}</div>` : '');
    list.appendChild(li);
  });
  el.classList.add('visible');
}

/* ════════════════════════════════════════════════════════════════════════════
   REPORTS
   ════════════════════════════════════════════════════════════════════════════ */
function loadReports() {
  const grid = document.getElementById('reportsGrid');
  grid.innerHTML = '<span style="color:#8890b5;">Loading reports...</span>';
  selectedReports.clear();

  fetch(SERVER + '/reports')
    .then(r => r.json())
    .then(data => {
      const reports = data.reports || data || [];
      if (!reports.length) {
        grid.innerHTML = '<span style="color:#8890b5;">No reports found.</span>';
        return;
      }
      grid.innerHTML = '';
      reports.forEach((rpt, i) => {
        const card = document.createElement('div');
        card.className = 'report-card';
        card.dataset.file = rpt.file || rpt.name || '';
        card.dataset.index = i;
        const passes = rpt.passes || 0;
        const failures = rpt.failures || 0;
        const title = rpt.file || rpt.name || 'Report ' + (i + 1);
        const time = rpt.time || rpt.date || '';
        const safeFile = (rpt.file || rpt.name || '').replace(/'/g, "\\'");
        card.innerHTML = `
          <div class="rc-check" onclick="event.stopPropagation();toggleReportSelect(this.parentElement)"></div>
          <div class="rc-title">${escapeHtml(title)}</div>
          <div class="rc-time">${escapeHtml(time)}</div>
          <div class="rc-stats">
            <span class="rc-pass">${passes} passed</span>
            <span class="rc-fail">${failures} failed</span>
          </div>
          <div style="display:flex;gap:8px;margin-top:10px;">
            <button class="btn-run" onclick="event.stopPropagation();openReportDetail('${safeFile}')">View Report</button>
            <button class="btn-run" onclick="event.stopPropagation();downloadReportAsPDF('${safeFile}')" style="color:#6c7bf0;border-color:#4a4f80;">PDF</button>
          </div>`;
        grid.appendChild(card);
      });
    })
    .catch(err => {
      grid.innerHTML = `<span style="color:#f87171;">Error loading reports: ${escapeHtml(err.message)}</span>`;
    });
}

function toggleReportSelect(card) {
  const file = card.dataset.file;
  if (selectedReports.has(file)) {
    selectedReports.delete(file);
    card.classList.remove('selected');
  } else {
    selectedReports.add(file);
    card.classList.add('selected');
  }
}

function deleteSelectedReports() {
  if (selectedReports.size === 0) {
    showToast('No reports selected', 'error');
    return;
  }
  const files = Array.from(selectedReports);
  fetch(SERVER + '/reports/delete', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ files })
  })
    .then(r => r.json())
    .then(() => {
      showToast(`Deleted ${files.length} report(s)`, 'success');
      loadReports();
    })
    .catch(err => {
      showToast('Delete failed: ' + err.message, 'error');
    });
}

function downloadSelectedReports() {
  if (selectedReports.size === 0) {
    showToast('No reports selected — downloading all', 'info');
    fetch(SERVER + '/reports')
      .then(r => r.json())
      .then(data => {
        const reports = data.reports || data || [];
        if (!reports.length) { showToast('No reports to download', 'error'); return; }
        reports.forEach(r => downloadReportAsPDF(r.file || r.name || ''));
      })
      .catch(err => showToast('Error: ' + err.message, 'error'));
    return;
  }
  Array.from(selectedReports).forEach(f => downloadReportAsPDF(f));
}

function downloadReportAsPDF(file) {
  if (!window.jspdf) {
    showToast('PDF library loading... try again in a moment', 'error');
    // Try loading it dynamically
    const s = document.createElement('script');
    s.src = 'https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.2/jspdf.umd.min.js';
    document.head.appendChild(s);
    return;
  }
  fetch(SERVER + '/reports/get?file=' + encodeURIComponent(file))
    .then(r => r.json())
    .then(data => {
      const detail = data.detail || {};
      const passes = Array.isArray(detail.passes) ? detail.passes
                   : Array.isArray(data.passes) ? data.passes : [];
      const failures = Array.isArray(detail.failures) ? detail.failures
                     : Array.isArray(data.failures) ? data.failures : [];
      const passCount = passes.length || (typeof data.passes === 'number' ? data.passes : 0);
      const failCount = failures.length || (typeof data.failures === 'number' ? data.failures : 0);
      const title = data.label || data.file || data.name || file;
      const time = data.time || data.date || new Date().toISOString();
      const total = passCount + failCount;

      const { jsPDF } = window.jspdf;
      const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
      const W = doc.internal.pageSize.getWidth();
      let y = 20;

      const checkPage = (need) => { if (y + need > 275) { doc.addPage(); y = 20; } };

      // Header bar
      doc.setFillColor(34, 37, 64);
      doc.rect(0, 0, W, 38, 'F');
      doc.setFontSize(18);
      doc.setTextColor(232, 236, 255);
      doc.text('E2E Test Report', 14, 16);
      doc.setFontSize(9);
      doc.setTextColor(136, 144, 181);
      doc.text(title, 14, 24);
      doc.text('Generated: ' + time, 14, 30);

      // Summary boxes
      y = 48;
      const boxW = 40, boxH = 20, gap = 8;
      // Total
      doc.setFillColor(44, 48, 80);
      doc.roundedRect(14, y, boxW, boxH, 3, 3, 'F');
      doc.setFontSize(16); doc.setTextColor(108, 123, 240);
      doc.text('' + total, 34, y + 10, { align: 'center' });
      doc.setFontSize(7); doc.setTextColor(136, 144, 181);
      doc.text('TOTAL', 34, y + 16, { align: 'center' });
      // Passed
      doc.setFillColor(26, 58, 42);
      doc.roundedRect(14 + boxW + gap, y, boxW, boxH, 3, 3, 'F');
      doc.setFontSize(16); doc.setTextColor(74, 222, 128);
      doc.text('' + passCount, 14 + boxW + gap + boxW / 2, y + 10, { align: 'center' });
      doc.setFontSize(7); doc.setTextColor(136, 144, 181);
      doc.text('PASSED', 14 + boxW + gap + boxW / 2, y + 16, { align: 'center' });
      // Failed
      doc.setFillColor(58, 26, 26);
      doc.roundedRect(14 + (boxW + gap) * 2, y, boxW, boxH, 3, 3, 'F');
      doc.setFontSize(16); doc.setTextColor(248, 113, 113);
      doc.text('' + failCount, 14 + (boxW + gap) * 2 + boxW / 2, y + 10, { align: 'center' });
      doc.setFontSize(7); doc.setTextColor(136, 144, 181);
      doc.text('FAILED', 14 + (boxW + gap) * 2 + boxW / 2, y + 16, { align: 'center' });

      y = 78;

      // Group tests by file
      const pdfFileGroups = {};
      passes.forEach(p => {
        const fp = (typeof p === 'string' ? '' : (p.file || '')).replace(/\\\\/g, '/').replace(/\\/g, '/');
        const fname = fp.split('/').pop() || 'Unknown';
        if (!pdfFileGroups[fname]) pdfFileGroups[fname] = { pass: [], fail: [] };
        pdfFileGroups[fname].pass.push(typeof p === 'string' ? p : (p.title || 'Test'));
      });
      failures.forEach(f => {
        const fp = (typeof f === 'string' ? '' : (f.file || '')).replace(/\\\\/g, '/').replace(/\\/g, '/');
        const fname = fp.split('/').pop() || 'Unknown';
        if (!pdfFileGroups[fname]) pdfFileGroups[fname] = { pass: [], fail: [] };
        pdfFileGroups[fname].fail.push({ title: typeof f === 'string' ? f : (f.title || 'Test'), err: f.err });
      });

      const pdfFileNames = Object.keys(pdfFileGroups).sort();
      if (pdfFileNames.length > 0) {
        pdfFileNames.forEach(fname => {
          const g = pdfFileGroups[fname];
          const fPass = g.pass.length, fFail = g.fail.length;
          // File header
          checkPage(14);
          doc.setFillColor(30, 32, 64);
          doc.roundedRect(14, y - 4, W - 28, 10, 2, 2, 'F');
          doc.setFontSize(9); doc.setTextColor(212, 216, 240);
          doc.text(fname, 18, y + 1);
          doc.setFontSize(7);
          doc.setTextColor(74, 222, 128); doc.text(fPass + ' passed', W - 60, y + 1);
          if (fFail > 0) { doc.setTextColor(248, 113, 113); doc.text(fFail + ' failed', W - 32, y + 1); }
          y += 10;
          // Passed tests in this file
          g.pass.forEach((t, i) => {
            checkPage(7);
            doc.setFillColor(26, 58, 42);
            doc.roundedRect(18, y - 3, W - 36, 6, 1, 1, 'F');
            doc.setFontSize(7); doc.setTextColor(74, 222, 128);
            doc.text('PASS', 21, y + 0.5);
            doc.setFontSize(8); doc.setTextColor(212, 216, 240);
            const pLines = doc.splitTextToSize(t, W - 60);
            doc.text(pLines[0], 36, y + 0.5);
            y += 7;
          });
          // Failed tests in this file
          g.fail.forEach((f, i) => {
            checkPage(12);
            const fLines = doc.splitTextToSize(f.title, W - 60);
            const errMsg = f.err && f.err.message ? f.err.message : '';
            const errLines = errMsg ? doc.splitTextToSize('Error: ' + errMsg, W - 62) : [];
            const blockH = fLines.length * 5 + errLines.length * 4 + 3;
            doc.setFillColor(58, 26, 26);
            doc.roundedRect(18, y - 3, W - 36, blockH, 1, 1, 'F');
            doc.setFontSize(7); doc.setTextColor(248, 113, 113);
            doc.text('FAIL', 21, y + 0.5);
            doc.setFontSize(8); doc.setTextColor(212, 216, 240);
            doc.text(fLines[0], 36, y + 0.5);
            if (errLines.length) {
              doc.setFontSize(6.5); doc.setTextColor(248, 160, 160);
              doc.text(errLines, 36, y + fLines.length * 5);
              doc.setFontSize(8);
            }
            y += blockH + 2;
          });
          y += 4;
        });
      } else if (passCount > 0 || failCount > 0) {
        doc.setFontSize(9); doc.setTextColor(136, 144, 181);
        doc.text(passCount + ' passed, ' + failCount + ' failed (details not available)', 14, y);
        y += 8;
      }

      // Footer
      checkPage(12);
      y += 6;
      doc.setDrawColor(53, 56, 96); doc.setLineWidth(0.2);
      doc.line(14, y, W - 14, y);
      y += 6;
      doc.setFontSize(7); doc.setTextColor(136, 144, 181);
      doc.text('Customer API E2E Test Dashboard  |  Auto-generated report', W / 2, y, { align: 'center' });

      const safeName = title.replace(/[^a-zA-Z0-9_\-\.]/g, '_');
      doc.save(safeName + '.pdf');
      showToast('PDF downloaded: ' + title, 'success');
    })
    .catch(err => {
      showToast('PDF failed: ' + err.message, 'error');
    });
}

function openReportDetail(file) {
  const overlay = document.getElementById('reportDetailOverlay');
  const modal = document.getElementById('reportDetailModal');
  modal.innerHTML = '<span style="color:#8890b5;">Loading report detail...</span>';
  overlay.classList.add('visible');

  fetch(SERVER + '/reports/get?file=' + encodeURIComponent(file))
    .then(r => r.json())
    .then(data => {
      // Test details are in data.detail (mochawesome), counts in data.passes/failures
      const detail = data.detail || {};
      const passes = Array.isArray(detail.passes) ? detail.passes
                   : Array.isArray(data.passes) ? data.passes : [];
      const failures = Array.isArray(detail.failures) ? detail.failures
                     : Array.isArray(data.failures) ? data.failures : [];
      const passCount = passes.length || (typeof data.passes === 'number' ? data.passes : 0);
      const failCount = failures.length || (typeof data.failures === 'number' ? data.failures : 0);
      const title = data.label || data.file || data.name || file;
      const time = data.time || data.date || '';

      // Group all tests by file
      const fileGroups = {};
      passes.forEach(p => {
        const f = (typeof p === 'string' ? '' : (p.file || '')).replace(/\\\\/g, '/').replace(/\\/g, '/');
        const fname = f.split('/').pop() || 'Unknown';
        if (!fileGroups[fname]) fileGroups[fname] = { pass: [], fail: [] };
        fileGroups[fname].pass.push(typeof p === 'string' ? p : (p.title || 'Test'));
      });
      failures.forEach(f => {
        const fp = (typeof f === 'string' ? '' : (f.file || '')).replace(/\\\\/g, '/').replace(/\\/g, '/');
        const fname = fp.split('/').pop() || 'Unknown';
        if (!fileGroups[fname]) fileGroups[fname] = { pass: [], fail: [] };
        fileGroups[fname].fail.push({ title: typeof f === 'string' ? f : (f.title || 'Test'), err: f.err });
      });

      let html = `<h2>${escapeHtml(title)}</h2>
        <div class="rd-time">${escapeHtml(time)}</div>
        <div style="display:flex;gap:14px;margin-bottom:18px;">
          <span style="color:#4ade80;font-weight:600;font-size:1rem;">${passCount} passed</span>
          <span style="color:#f87171;font-weight:600;font-size:1rem;">${failCount} failed</span>
          <span style="color:#6c7bf0;font-weight:600;font-size:1rem;">${passCount + failCount} total</span>
        </div>`;

      const fileNames = Object.keys(fileGroups).sort();
      if (fileNames.length > 0) {
        fileNames.forEach(fname => {
          const g = fileGroups[fname];
          const fPass = g.pass.length, fFail = g.fail.length;
          html += `<div style="margin-bottom:16px;">
            <div style="display:flex;align-items:center;gap:10px;padding:8px 12px;background:#1e2040;border-radius:8px;margin-bottom:6px;">
              <span style="font-weight:600;color:#d4d8f0;font-size:0.85rem;flex:1;">${escapeHtml(fname)}</span>
              <span style="color:#4ade80;font-size:0.75rem;font-weight:600;">${fPass} passed</span>
              ${fFail > 0 ? `<span style="color:#f87171;font-size:0.75rem;font-weight:600;">${fFail} failed</span>` : ''}
            </div>
            <ul class="rd-test-list" style="margin-left:8px;">`;
          g.pass.forEach(t => {
            html += `<li class="rd-test-item">
              <span class="badge badge-pass">Pass</span>
              <div class="rd-test-title">${escapeHtml(t)}</div>
            </li>`;
          });
          g.fail.forEach(f => {
            html += `<li class="rd-test-item">
              <span class="badge badge-fail">Fail</span>
              <div>
                <div class="rd-test-title">${escapeHtml(f.title)}</div>
                ${f.err && f.err.message ? `<div class="rd-test-err">${escapeHtml(f.err.message)}</div>` : ''}
              </div>
            </li>`;
          });
          html += `</ul></div>`;
        });
      } else {
        html += `<div style="color:#8890b5;padding:12px;">No test details available (${passCount} passed, ${failCount} failed)</div>`;
      }

      html += `
        <div style="text-align:right;margin-top:16px;display:flex;gap:10px;justify-content:flex-end;">
          <button class="btn btn-primary" onclick="downloadReportAsPDF('${escapeHtml(file)}')">⬇ Download PDF</button>
          <button class="btn btn-secondary" onclick="closeReportDetail()">Close</button>
        </div>`;
      modal.innerHTML = html;
    })
    .catch(err => {
      modal.innerHTML = `<span style="color:#f87171;">Error: ${escapeHtml(err.message)}</span>
        <div style="text-align:right;margin-top:16px;">
          <button class="btn btn-secondary" onclick="closeReportDetail()">Close</button>
        </div>`;
    });
}

function closeReportDetail() {
  document.getElementById('reportDetailOverlay').classList.remove('visible');
}

/* ════════════════════════════════════════════════════════════════════════════
   UTILS
   ════════════════════════════════════════════════════════════════════════════ */
function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#039;');
}

/* ════════════════════════════════════════════════════════════════════════════
   SERVER STATUS PING
   ════════════════════════════════════════════════════════════════════════════ */
function checkServerStatus() {
  const el = document.getElementById('serverStatus');
  const dot = el.querySelector('.status-dot');
  fetch(SERVER + '/ping', { signal: AbortSignal.timeout(3000) })
    .then(r => {
      el.className = 'server-status online';
      dot.className = 'status-dot online';
      el.innerHTML = '<span class="status-dot online"></span> Server Online';
    })
    .catch(() => {
      el.className = 'server-status offline';
      dot.className = 'status-dot offline';
      el.innerHTML = '<span class="status-dot offline"></span> Server Offline';
    });
}
checkServerStatus();
setInterval(checkServerStatus, 10000);
